[project]
name = "da-semantic"
version = "0.1.0"
description = "语义层引擎：数据模型 + 版本化存储（架构文档 4）"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7", "da-types"]

[tool.uv.sources]
da-types = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/da_semantic"]
