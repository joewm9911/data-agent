[project]
name = "da-runtime"
version = "0.1.0"
description = "Agent 运行时：回合任务/会话锁/检查点（架构文档 7）"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7", "da-types", "da-platform"]

[tool.uv.sources]
da-types = { workspace = true }
da-platform = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/da_runtime"]
