[project]
name = "da-evals"
version = "0.1.0"
description = "Eval harness：golden 场景 + 回归（架构文档 8.3）"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7", "da-types", "da-semantic"]

[tool.uv.sources]
da-types = { workspace = true }
da-semantic = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/da_evals"]
