[project]
name = "da-evals"
version = "0.1.0"
description = "Eval harness：golden set 管理与回归（架构文档 8.3）。M1 落地。"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7", "da-types"]

[tool.uv.sources]
da-types = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/da_evals"]
