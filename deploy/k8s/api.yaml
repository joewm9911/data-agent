# 私有化-集群 / VPC 形态：API 无状态层（7.5 部署态）
# Postgres/Redis/对象存储使用企业中间件或云托管服务，经环境变量注入（Provider 抽象）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-agent-api
  labels: { app: data-agent-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: data-agent-api }
  template:
    metadata:
      labels: { app: data-agent-api }
    spec:
      containers:
        - name: api
          image: data-agent:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: data-agent-secrets }   # DA_LLM_API_KEY 等
            - configMapRef: { name: data-agent-config } # DA_PG_DSN / DA_REDIS_URL
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-agent-api
spec:
  selector: { app: data-agent-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-agent-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-agent-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
